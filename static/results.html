<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alfursan seats finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/styles.css">
</head>
<body data-page="results">
<header>
  <div class="bar wrap">
    <a class="brand" href="/" style="text-decoration:none;color:inherit">
      <div class="glyph"><svg viewBox="0 0 24 24" fill="none" stroke="#C2982F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 16l9-3 4-9 2 1-2 8 6-2 1 2-7 3-2 5-2-1 1-4-7 2z"/></svg></div>
      <div class="brand-text">
        <h1 data-i18n="title">Alfursan seats finder</h1>
        <div class="sub" data-i18n="subtitle">Seats bookable with miles — Saudia & SkyTeam partners</div>
      </div>
    </a>
    <div class="bar-actions">
      <div class="updated"><span class="dot" id="statusDot"></span><span id="updatedTxt">…</span></div>
      <button class="refresh-btn" id="refreshBtn">
        <svg class="ri" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
        <span data-i18n="refreshNow">Refresh now</span>
      </button>
      <button class="lang" id="langBtn">ع</button>
    </div>
  </div>
</header>
<main class="wrap">
  <div id="loading" class="loading" data-i18n="loading">Loading data…</div>
  <div class="grid" id="cards"></div>
</main>
<footer class="wrap" style="padding-bottom:40px;color:var(--muted-2);font-size:12px;text-align:center">
  <span data-i18n="foot">Cached data, refreshed periodically · always confirm on Saudia before booking</span>
</footer>
<script src="/static/js/app.js"></script>
</body>
</html>
