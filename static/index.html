<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alfursan seats finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  /* Optional: drop the official "Saudi Font" file into static/fonts/ to use it automatically */
  @font-face{font-family:"SaudiOfficial";src:url("/static/fonts/saudi.woff2") format("woff2"),url("/static/fonts/saudi.ttf") format("truetype");font-weight:100 900;font-display:swap;}
  :root{
    --ink:#13211F;--teal:#0C4A42;--teal-deep:#093A33;--jade:#2A8B7C;--gold:#C2982F;--burgundy:#8A3344;
    --bg:#EEF1F0;--card:#FFFFFF;--line:#DBE2E0;--muted:#69736F;--muted-2:#9AA39F;
    --shadow:0 1px 2px rgba(12,74,66,.05), 0 6px 22px rgba(12,74,66,.06);
    --maxw:1500px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"SaudiOfficial","Tajawal",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .mono{font-family:"IBM Plex Mono",ui-monospace,monospace;font-feature-settings:"tnum"}
  .wrap{width:min(var(--maxw),94vw);margin:0 auto}
  header{background:linear-gradient(165deg,var(--teal) 0%,var(--teal-deep) 100%);color:#EAF2F0;padding:14px 0;position:sticky;top:0;z-index:30}
  .bar{display:flex;align-items:center;gap:14px}
  .bar-actions{display:flex;align-items:center;gap:10px;margin-inline-start:auto;flex-wrap:wrap;justify-content:flex-end}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand-text{min-width:0}
  .glyph{width:40px;height:40px;border-radius:11px;flex:0 0 auto;background:radial-gradient(circle at 30% 30%,#1c6b5f,#0a3e37);border:1px solid rgba(194,152,47,.55);display:grid;place-items:center}
  .glyph svg{width:22px;height:22px}
  .brand h1{font-weight:800;font-size:21px;margin:0;letter-spacing:.2px}
  .brand .sub{font-size:11.5px;color:#9fc4bd;margin-top:1px;letter-spacing:.2px}
  .updated{display:flex;align-items:center;gap:7px;font-size:12px;color:#bcd6d0;background:rgba(255,255,255,.06);padding:7px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.08);white-space:nowrap}
  .dot{width:7px;height:7px;border-radius:50%;background:#56c596;box-shadow:0 0 0 3px rgba(86,197,150,.18)}
  .dot.warn{background:#e0b341;box-shadow:0 0 0 3px rgba(224,179,65,.18)}
  .dot.err{background:#d8675f;box-shadow:0 0 0 3px rgba(216,103,95,.18)}
  .refresh-btn,.lang{cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;font-size:12.5px;font-weight:700;color:#EAF2F0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);padding:8px 13px;border-radius:9px}
  .refresh-btn:hover,.lang:hover{background:rgba(255,255,255,.15)}
  .refresh-btn:disabled{opacity:.65;cursor:default}
  .refresh-btn .ri{width:14px;height:14px}
  .refresh-btn.spin .ri{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .notice{margin-top:14px;padding:11px 14px;border-radius:10px;font-size:13px;display:none;align-items:center;gap:9px}
  .notice.err{background:#FBEAE8;border:1px solid #E8B6B0;color:#8a342c;display:flex}
  main{padding:20px 0 70px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px 20px;margin-bottom:22px}
  .flabel{font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:9px;letter-spacing:.3px;text-transform:uppercase}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:11px;padding:8px 13px;font-size:13.5px;font-weight:600;color:var(--ink);display:flex;gap:8px;align-items:center;transition:.14s}
  .chip .code{font-family:"IBM Plex Mono";font-size:11.5px;color:var(--muted-2);font-weight:600}
  .chip:hover{border-color:#9fb8b2}
  .chip.on{background:var(--teal);border-color:var(--teal);color:#fff}.chip.on .code{color:#a8ccc4}
  .controls{display:flex;flex-wrap:wrap;gap:22px;align-items:flex-end;margin-top:18px;padding-top:18px;border-top:1px solid var(--line)}
  .ctrl{display:flex;flex-direction:column}
  .seg{display:inline-flex;background:#EEF2F1;border:1px solid var(--line);border-radius:12px;padding:4px;gap:3px}
  .seg button{border:0;background:transparent;cursor:pointer;border-radius:9px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:7px}
  .seg button .swatch{width:9px;height:9px;border-radius:50%}
  .seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .sw-all{background:conic-gradient(var(--jade),var(--gold),var(--burgundy),var(--jade))}
  .sw-y{background:var(--jade)}.sw-j{background:var(--gold)}.sw-f{background:var(--burgundy)}
  .daterow{display:flex;align-items:center;gap:9px}
  .daterow.off{opacity:.4;pointer-events:none}
  .dayrow{display:flex;align-items:center;gap:7px}
  .dayrow input[type=date]{font-family:inherit;color:var(--ink)}
  .dayclear{display:none;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:9px;padding:9px 12px;font-size:13px;font-weight:700;font-family:inherit}
  .dayclear.show{display:inline-block}
  .dayclear:hover{border-color:#bcd0cb;color:var(--ink)}
  .sel{border:1px solid var(--line);background:#fff;border-radius:11px;padding:9px 13px;font-size:14px;font-family:inherit;color:var(--ink)}
  .sel.month{min-width:140px}
  .arrow{color:var(--muted-2)}
  .results{display:grid;grid-template-columns:232px 1fr;gap:20px;align-items:start}
  .rail{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px;box-shadow:var(--shadow);position:sticky;top:90px}
  .rail h3{font-size:11px;letter-spacing:.4px;color:var(--muted);margin:10px 12px 6px;font-weight:700;text-transform:uppercase}
  .rail-scroll{max-height:70vh;overflow:auto}
  .ctry{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:9px 12px;border-radius:9px;font-size:14px;color:var(--ink)}
  .ctry:hover{background:#F1F5F4}
  .ctry.on{background:var(--teal);color:#fff}
  .ctry .n{font-family:"IBM Plex Mono";font-size:12px;color:var(--muted-2);background:#EEF2F1;border-radius:6px;padding:1px 7px}
  .ctry.on .n{background:rgba(255,255,255,.18);color:#dff0ec}
  .meta{font-size:12.5px;color:var(--muted);margin:2px 2px 14px}
  .country-mobile{display:none;margin-bottom:14px}
  .country-mobile .sel{width:100%}
  .country-mobile .flabel{margin-bottom:7px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:15px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:15px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:.16s}
  .card:hover{transform:translateY(-2px);border-color:#bcd0cb;box-shadow:0 8px 18px rgba(12,74,66,.10)}
  .card .top{padding:15px 16px 12px;display:flex;justify-content:space-between;align-items:flex-start}
  .dest .city{font-size:17px;font-weight:800}
  .dest .ctyname{font-size:12.5px;color:var(--muted);margin-top:1px}
  .route{display:flex;align-items:center;gap:6px;font-family:"IBM Plex Mono";font-size:12px;color:var(--muted-2);margin-top:8px}
  .route .pin{color:var(--gold)}
  .iata-badge{font-family:"IBM Plex Mono";font-size:12px;font-weight:600;color:var(--teal);background:#E7F0EE;border:1px solid #cfe2dd;border-radius:8px;padding:4px 9px}
  .cabins{display:flex;gap:6px;padding:0 16px 12px}
  .cab{flex:1;border-radius:9px;padding:8px 6px;text-align:center;border:1px solid var(--line);font-size:11.5px;color:var(--muted-2);background:#FAFBFB}
  .cab.has{color:#fff;border:0}.cab.has .v{font-family:"IBM Plex Mono";font-weight:600;font-size:13px}
  .cab small{display:block;font-size:10px;font-weight:500}
  .cab.y{background:var(--jade)}.cab.j{background:var(--gold)}.cab.f{background:var(--burgundy)}
  .card .foot{border-top:1px solid var(--line);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--muted);background:#FBFCFC}
  .card .foot b{color:var(--ink);font-family:"IBM Plex Mono"}
  .empty{background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:46px 20px;text-align:center;color:var(--muted)}
  .empty .big{font-size:18px;font-weight:800;color:var(--ink);margin-bottom:6px}
  .detail .back{display:inline-flex;align-items:center;gap:8px;cursor:pointer;color:var(--teal);font-weight:700;font-size:13.5px;margin-bottom:16px;background:#fff;border:1px solid var(--line);font-family:inherit;padding:10px 16px;border-radius:11px;box-shadow:var(--shadow)}
  .detail .back:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
  .detail .back svg{width:15px;height:15px}
  .dhead{background:linear-gradient(160deg,var(--teal),var(--teal-deep));color:#eaf2f0;border-radius:16px;padding:22px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
  .dhead .city{font-size:25px;font-weight:800}
  .dhead .ctyname{color:#a8ccc4;font-size:13px;margin-top:2px}
  .dhead .pathline{display:flex;align-items:center;gap:9px;font-family:"IBM Plex Mono";font-size:13px;color:#cfe6e1;margin-top:10px}
  .dhead .price-tag{text-align:end}
  .dhead .price-tag .k{font-family:"IBM Plex Mono";font-size:23px;font-weight:600;color:#fff}
  .dhead .price-tag small{display:block;font-size:11px;color:#a8ccc4}
  .strip-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);margin-bottom:16px}
  .strip-wrap .lab{font-size:12.5px;color:var(--muted);margin-bottom:12px;font-weight:700}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:14px}
  .legend span{display:flex;align-items:center;gap:6px}.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
  .month-block{margin-bottom:14px}
  .month-block .mname{font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:8px}
  .days{display:flex;flex-wrap:wrap;gap:5px}
  .day{width:38px;height:46px;border-radius:8px;border:1px solid var(--line);background:#FAFBFB;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .day .dn{font-family:"IBM Plex Mono";font-size:12px;color:var(--muted-2);font-weight:600}
  .day .pips{display:flex;gap:2px;margin-top:4px;height:6px}.day .pips i{width:5px;height:5px;border-radius:50%}
  .day.none{opacity:.4}.day.hit{background:#fff;border-color:#cfe2dd}
  .table{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .thead,.trow{display:grid;grid-template-columns:120px 1fr 92px 74px 70px 30px;gap:8px;align-items:center}
  .thead{padding:12px 16px;background:#F4F7F6;font-size:11.5px;color:var(--muted);font-weight:700}
  .trow{padding:13px 16px;border-top:1px solid var(--line);font-size:13.5px;cursor:pointer}
  .trow:hover{background:#F8FAF9}
  .trow .t-date{font-family:"IBM Plex Mono";font-weight:600}
  .trow .t-date small{display:block;color:var(--muted-2);font-weight:500;font-size:11px;font-family:inherit}
  .pill{display:inline-flex;align-items:center;gap:6px;border-radius:7px;padding:3px 9px;font-size:11.5px;font-weight:700;color:#fff}
  .pill.y{background:var(--jade)}.pill.j{background:var(--gold)}.pill.f{background:var(--burgundy)}
  .trow .t-miles{font-family:"IBM Plex Mono";font-weight:600}
  .tag-direct{font-size:11px;color:var(--jade);font-weight:700}.tag-stop{font-size:11px;color:var(--muted-2)}
  .t-flights{font-family:"IBM Plex Mono";font-size:12.5px;color:var(--muted)}
  .airl{font-family:"IBM Plex Mono";font-size:11.5px;color:var(--muted-2)}
  .caret{color:var(--muted-2);text-align:center;transition:.15s}
  .trow.open .caret{transform:rotate(180deg);color:var(--teal)}
  .trow-exp{border-top:1px dashed var(--line);background:#F8FAF9;padding:0 16px;display:none}
  .trow-exp.show{display:block;padding:14px 16px}
  .exp-load,.exp-err{font-size:12.5px;color:var(--muted);padding:4px 0}
  .exp-err{color:#a8584f}
  .trip{padding:9px 0;border-bottom:1px solid #eef2f1}
  .trip:last-of-type{border-bottom:0}
  .trip-h{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .trip-h .fn{font-family:"IBM Plex Mono";font-weight:600;color:var(--ink);font-size:13.5px}
  .trip-meta{font-size:11.5px;color:var(--muted)}
  .segs{display:flex;flex-direction:column;gap:3px;margin-top:5px}
  .segs .seg2{font-size:12px;color:var(--muted);line-height:1.5}
  .segs .seg2 b{font-family:"IBM Plex Mono";color:var(--ink)}
  .book{display:inline-block;margin-top:10px;background:var(--teal);color:#fff;text-decoration:none;font-size:12.5px;font-weight:700;padding:8px 14px;border-radius:9px}
  .book:hover{background:var(--teal-deep)}
  .loading{text-align:center;padding:60px 20px;color:var(--muted)}
  @media(max-width:820px){
    .results{grid-template-columns:1fr}.rail{display:none}
    .country-mobile{display:block}
    .controls{gap:16px}
    .thead{display:none}
    .trow{display:grid;align-items:center;column-gap:10px;row-gap:7px;padding:13px 15px;
      grid-template-columns:auto auto 1fr auto;
      grid-template-areas:"date date date miles" "cabin type flights caret";}
    .trow .t-date{grid-area:date;font-size:14px;white-space:nowrap}
    .trow .t-date small{display:inline;margin-inline-start:7px;font-size:11.5px}
    .t-miles{grid-area:miles;justify-self:end;align-self:center;white-space:nowrap;font-size:14px}
    .t-cabin{grid-area:cabin;display:flex;align-items:center;gap:6px}
    .t-type{grid-area:type;white-space:nowrap}
    .t-flights{grid-area:flights;justify-self:start;white-space:nowrap}
    .caret{grid-area:caret;justify-self:end;width:auto}
  }
  @media(max-width:640px){
    header{padding:11px 0}
    .bar{flex-wrap:wrap;gap:10px}
    .brand{flex:1 1 auto}
    .brand h1{font-size:17px;line-height:1.25}
    .glyph{width:34px;height:34px;border-radius:9px}
    .glyph svg{width:18px;height:18px}
    .brand .sub{display:none}
    .bar-actions{width:100%;margin-inline-start:0;justify-content:flex-start;gap:8px}
    .updated{font-size:11px;padding:6px 10px}
    .refresh-btn,.lang{font-size:12px;padding:7px 11px}
    main{padding:16px 0 60px}
    .panel{padding:14px;border-radius:14px;margin-bottom:16px}
    .controls{gap:14px}
    .ctrl{flex:1 1 100%}
    .seg{width:100%;flex-wrap:wrap}
    .seg button{flex:1 1 40%;justify-content:center;padding:9px 4px;font-size:12px;line-height:1.15;text-align:center}
    .daterow{width:100%}
    .sel.month{flex:1;min-width:0}
    .dayrow{width:100%}
    .dayrow input[type=date]{flex:1;min-width:0}
    #seats{width:100%}
    .chips{gap:7px}
    .chip{font-size:13px;padding:7px 11px}
    .dhead{padding:18px;flex-wrap:nowrap;align-items:flex-start;gap:12px}
    .dhead .price-tag{flex:0 0 auto}
    .dhead .city{font-size:21px}
  }
</style>
</head>
<body>
<header>
  <div class="bar wrap">
    <div class="brand">
      <div class="glyph"><svg viewBox="0 0 24 24" fill="none" stroke="#C2982F" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 16l9-3 4-9 2 1-2 8 6-2 1 2-7 3-2 5-2-1 1-4-7 2z"/></svg></div>
      <div class="brand-text">
        <h1 data-i18n="title">Alfursan seats finder</h1>
        <div class="sub" data-i18n="subtitle">Seats bookable with miles — Saudia & SkyTeam partners</div>
      </div>
    </div>
    <div class="bar-actions">
      <div class="updated"><span class="dot" id="statusDot"></span><span id="updatedTxt">…</span></div>
      <button class="refresh-btn" id="refreshBtn">
        <svg class="ri" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>
        <span data-i18n="refreshNow">Refresh now</span>
      </button>
      <button class="lang" id="langBtn">ع</button>
    </div>
  </div>
</header>

<div class="wrap"><div class="notice" id="notice"></div></div>

<main class="wrap">
  <div class="panel">
    <div>
      <div class="flabel" data-i18n="from">Departure city</div>
      <div class="chips" id="origins"></div>
    </div>
    <div class="controls">
      <div class="ctrl">
        <div class="flabel" data-i18n="cabin">Cabin</div>
        <div class="seg" id="cabins">
          <button data-c="ALL" class="on"><span class="swatch sw-all"></span><span data-i18n="allCab">All</span></button>
          <button data-c="Y"><span class="swatch sw-y"></span><span data-i18n="eco">Economy</span></button>
          <button data-c="J"><span class="swatch sw-j"></span><span data-i18n="biz">Business</span></button>
          <button data-c="F"><span class="swatch sw-f"></span><span data-i18n="first">First</span></button>
        </div>
      </div>
      <div class="ctrl">
        <div class="flabel" data-i18n="range">Date range</div>
        <div class="daterow"><select class="sel month" id="m1"></select><span class="arrow" data-i18n="rangeArrow">→</span><select class="sel month" id="m2"></select></div>
      </div>
      <div class="ctrl">
        <div class="flabel" data-i18n="specificDay">Specific day</div>
        <div class="dayrow"><input type="date" class="sel" id="day"><button class="dayclear" id="dayClear" data-i18n="clearDay">Clear day</button></div>
      </div>
      <div class="ctrl">
        <div class="flabel" data-i18n="seatsLabel">Seats together</div>
        <select class="sel" id="seats">
          <option value="1">1</option><option value="2">2</option><option value="3">3</option>
          <option value="4">4</option><option value="5">5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        </select>
      </div>
    </div>
  </div>

  <div id="loading" class="loading" data-i18n="loading">Loading data…</div>

  <div id="gridView" style="display:none">
    <div class="results">
      <aside class="rail">
        <h3 data-i18n="country">Country</h3>
        <div class="rail-scroll" id="countryList"></div>
      </aside>
      <section>
        <div class="country-mobile"><div class="flabel" data-i18n="country">Country</div><select class="sel" id="countrySelect"></select></div>
        <div class="meta" id="resultMeta"></div>
        <div class="grid" id="cards"></div>
      </section>
    </div>
  </div>

  <div id="detailView" class="detail" style="display:none"></div>
</main>

<footer class="wrap" style="padding-bottom:40px;color:var(--muted-2);font-size:12px;text-align:center">
  <span data-i18n="foot">Cached data, refreshed periodically · always confirm on Saudia before booking</span>
</footer>

<script>
const I18N={
  ar:{title:"Alfursan seats finder",subtitle:"المقاعد المتاحة بالأميال — الخطوط السعودية وشركاء سكاي تيم",
      from:"مدينة المغادرة",cabin:"درجة السفر",range:"نطاق التاريخ",rangeArrow:"←",country:"الدولة",all:"كل الدول",
      allCab:"الكل",eco:"اقتصادي",biz:"رجال أعمال",first:"أولى",loading:"…جارٍ تحميل البيانات",
      seatsLabel:"عدد المقاعد معًا",seatsHint:"الأدنى المطلوب على نفس الرحلة",specificDay:"يوم محدّد",clearDay:"مسح اليوم",
      foot:"بيانات مخزّنة ومحدّثة دوريًا · أكّد دائمًا على موقع السعودية قبل الحجز",
      backTo:"رجوع للوجهات",daysAvail:"يوم متاح",from2:"ابتداءً من",miles:"ميل",cheapest:"أرخص سعر",
      exactDays:"الأيام المتاحة بالضبط",direct:"مباشر",stop:"توقف",seat:"مقعد",seats:"مقاعد",tapHint:"اضغط أي صف لعرض رقم الرحلة والأوقات",

let lang="en", RECORDS=[], META={}, MONTHS=[], origin=null, cabin="ALL", country="ALL", m1=0, m2=0, seats=1, day=null;
const TRIP_CACHE={};

const $=s=>document.querySelector(s);
const scrollToEl=el=>{if(!el)return;const h=document.querySelector('header');const hh=h?h.getBoundingClientRect().height:0;const y=el.getBoundingClientRect().top+window.pageYOffset-hh-8;window.scrollTo({top:Math.max(0,y),behavior:'smooth'});};
const L=()=>I18N[lang];

const ymOf=d=>d.slice(0,7);
const kk=v=>{const n=v/1000; return (v%1000===0?n:n.toFixed(1).replace(/\.0$/,''))+"k";};
const CABS=()=>cabin==='ALL'?['Y','J','F']:[cabin];
const passSeat=c=>c&&(seats<=1||(c.seats||0)>=seats);
const qualifies=x=>CABS().some(c=>passSeat(x[c]));

async function load(){
  try{
    const j=await (await fetch("/api/data",{cache:"no-store"})).json();
    applyData(j,false);
    $("#loading").style.display="none";
    if(j.status==="error"&&RECORDS.length===0){showError(j.error);return;}
    $("#notice").className="notice"; $("#gridView").style.display="block";
    renderOrigins();renderMonths();renderGrid();
    if(j.status==="refreshing")watchRefresh();
  }catch(e){$("#loading").style.display="none";showError(String(e));}
}
function applyData(j,preserve){
  RECORDS=j.records||[];META=j;
  MONTHS=[...new Set(RECORDS.map(x=>ymOf(x.date)).filter(Boolean))].sort();
  const ds=RECORDS.map(x=>x.date).filter(Boolean).sort();
  const dinp=$("#day");
  if(dinp&&ds.length){dinp.min=ds[0];dinp.max=ds[ds.length-1];}
  if(!preserve){
    if(j.origins&&j.origins.length)origin=j.origins[0].iata;
    if(MONTHS.length){m1=0;m2=Math.min(2,MONTHS.length-1);}
    setDay(null,true);
  }else{
    const codes=(j.origins||[]).map(o=>o.iata);
    if(codes.length&&!codes.includes(origin))origin=codes[0];
    if(MONTHS.length){m1=Math.min(m1,MONTHS.length-1);m2=Math.min(Math.max(m2,m1),MONTHS.length-1);}else{m1=0;m2=0;}
  }
  updateStatus();
}
function showError(msg){const n=$("#notice");n.className="notice err";n.textContent=L().errTitle+(msg?" — "+msg:"");}
function updateStatus(){
  const dot=$("#statusDot"),txt=$("#updatedTxt");
  if(META.status==="refreshing"){dot.className="dot warn";txt.textContent=L().refreshing;return;}
  if(!META.updated){dot.className="dot warn";txt.textContent=L().noData;return;}
  dot.className=META.status==="error"?"dot err":"dot";
  const mins=Math.max(0,Math.floor((Date.now()-Date.parse(META.updated))/60000));
  txt.textContent=mins<2?L().updNow:mins<60?L().updMin(mins):mins<1440?L().updHr(Math.floor(mins/60)):L().updDay(Math.floor(mins/1440));
}
let refreshKey="";
async function refreshNow(){
  const btn=$("#refreshBtn"); if(btn.classList.contains('spin'))return;
  let key=refreshKey;
  if(META.refreshProtected && !key){ key=(prompt(L().refreshPrompt)||"").trim(); if(!key)return; }
  btn.classList.add('spin');btn.disabled=true;$("#statusDot").className="dot warn";$("#updatedTxt").textContent=L().refreshing;
  const prev=META.updated;
  try{
    const r=await fetch("/api/refresh",{cache:"no-store",headers:key?{"X-Refresh-Key":key}:{}});
    if(r.status===401){refreshKey="";btn.classList.remove('spin');btn.disabled=false;updateStatus();alert(L().refreshWrong);return;}
    if(META.refreshProtected)refreshKey=key;
    let tries=0;
    const poll=async()=>{
      tries++; let j;
      try{j=await (await fetch("/api/data",{cache:"no-store"})).json();}catch(_){if(tries<60)return setTimeout(poll,3000);j=META;}
      if(((j.status!=="refreshing")&&(j.updated!==prev||j.status==="error"))||tries>=60){
        applyData(j,true);$("#notice").className="notice";
        if(j.status==="error"&&RECORDS.length===0)showError(j.error); else{renderOrigins();renderMonths();renderGrid();}
        btn.classList.remove('spin');btn.disabled=false;
        if(j.status==="refreshing")watchRefresh();
      }else setTimeout(poll,3000);
    };
    setTimeout(poll,2500);
  }catch(e){btn.classList.remove('spin');btn.disabled=false;updateStatus();}
}
let _watching=false;
async function watchRefresh(){
  if(_watching||META.status!=="refreshing")return;
  _watching=true;
  const tick=async()=>{
    let j;
    try{j=await (await fetch("/api/data",{cache:"no-store"})).json();}
    catch(_){return setTimeout(tick,5000);}
    if(j.status!=="refreshing"){
      _watching=false;
      applyData(j,true);
      $("#notice").className="notice";
      if(j.status==="error"&&RECORDS.length===0)showError(j.error);
      else if($("#detailView").style.display!=="block"){renderOrigins();renderMonths();renderGrid();}
      return;
    }
    setTimeout(tick,5000);
  };
  setTimeout(tick,5000);
}

function inRange(d){if(day)return d===day;const ym=ymOf(d);return ym>=MONTHS[m1]&&ym<=MONTHS[m2];}
function rowsForOrigin(){return RECORDS.filter(x=>x.o===origin&&inRange(x.date));}
function destAgg(){
  const rows=rowsForOrigin().filter(qualifies);
  const map={};
  rows.forEach(x=>{
    const m=map[x.d]||(map[x.d]={d:x.d,dcity:x.dcity,dcountry:x.dcountry,days:0,cheapest:Infinity,best:{Y:Infinity,J:Infinity,F:Infinity}});
    m.days++; CABS().forEach(c=>{if(passSeat(x[c])&&x[c].miles<m.cheapest)m.cheapest=x[c].miles;});
  });
  rowsForOrigin().forEach(x=>{if(map[x.d])['Y','J','F'].forEach(c=>{if(passSeat(x[c])&&x[c].miles<map[x.d].best[c])map[x.d].best[c]=x[c].miles;});});
  let list=Object.values(map);
  if(country!=="ALL")list=list.filter(m=>m.dcountry===country);
  return list.sort((a,b)=>a.cheapest-b.cheapest);
}
function countryCounts(){
  const rows=rowsForOrigin().filter(qualifies),seen={},counts={};
  rows.forEach(x=>{const key=x.dcountry+"|"+x.d;if(!seen[key]){seen[key]=1;counts[x.dcountry]=(counts[x.dcountry]||0)+1;}});
  return counts;
}
function renderOrigins(){
  const list=(META.origins&&META.origins.length)?META.origins:[{iata:origin||"—",city:""}];
  $("#origins").innerHTML=list.map(o=>`<div class="chip ${o.iata===origin?'on':''}" data-o="${o.iata}"><span>${origName(o.iata,o.city)}</span><span class="code">${o.iata}</span></div>`).join("");
}
function renderMonths(){
  const opt=sel=>MONTHS.map((ym,i)=>{const[y,mm]=ym.split('-');return `<option value="${i}" ${i===sel?'selected':''}>${(lang==='ar'?MONTHS_AR:MONTHS_EN)[+mm-1]} ${y}</option>`;}).join("");
  $("#m1").innerHTML=opt(m1);$("#m2").innerHTML=opt(m2);
}
function renderGrid(){renderCountries();renderCards();}
function renderCountries(){
  const counts=countryCounts(),total=Object.values(counts).reduce((a,b)=>a+b,0);
  const sorted=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
  let html=`<div class="ctry ${country==='ALL'?'on':''}" data-ctry="ALL"><span>${L().all}</span><span class="n">${total}</span></div>`;
  sorted.forEach(c=>{html+=`<div class="ctry ${country===c?'on':''}" data-ctry="${c}"><span>${ctryName(c)}</span><span class="n">${counts[c]}</span></div>`;});
  $("#countryList").innerHTML=html;
  const sel=$("#countrySelect");
  if(sel){
    let opts=`<option value="ALL" ${country==='ALL'?'selected':''}>${L().all} (${total})</option>`;
    sorted.forEach(c=>{opts+=`<option value="${c}" ${country===c?'selected':''}>${ctryName(c)} (${counts[c]})</option>`;});
    sel.innerHTML=opts;
  }
}
function cabChip(label,cls,val){if(val===Infinity||val==null)return `<div class="cab">${label}<small>—</small></div>`;return `<div class="cab has ${cls}">${label}<span class="v">${kk(val)}</span></div>`;}
function renderCards(){
  const list=destAgg();
  const o=(META.origins||[]).find(x=>x.iata===origin)||{};
  $("#resultMeta").textContent=L().resultMeta(list.length,origName(origin,o.city));
  if(!list.length){$("#cards").innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="big">${L().emptyTitle}</div><div>${L().emptyBody}</div></div>`;return;}
  $("#cards").innerHTML=list.map(m=>`
    <div class="card" data-dest="${m.d}">
      <div class="top"><div class="dest"><div class="city">${m.dcity}</div><div class="ctyname">${ctryName(m.dcountry)}</div>
        <div class="route"><span>${origin}</span><span class="pin">✈</span><span>${m.d}</span></div></div>
        <span class="iata-badge">${m.d}</span></div>
      <div class="cabins">${cabChip(L().eco,'y',m.best.Y)}${cabChip(L().biz,'j',m.best.J)}${cabChip(L().first,'f',m.best.F)}</div>
      <div class="foot"><span><b>${m.days}</b> ${L().daysAvail}</span><span>${L().from2} <b>${kk(m.cheapest)}</b> ${L().miles}</span></div>
    </div>`).join("");
}

function fmtT(iso){return iso?iso.slice(11,16):"";}
async function loadTrips(id,cab,exp,countEl){
  exp.innerHTML=`<div class="exp-load">${L().loadingFlights}</div>`;
  try{
    let data=TRIP_CACHE[id];
    if(!data){data=await (await fetch('/api/trips/'+id,{cache:'no-store'})).json();TRIP_CACHE[id]=data;}
    if(!data.ok){exp.innerHTML=`<div class="exp-err">${L().flightsErr}</div>`;return;}
    const want=CABMAP[cab];
    let trips=data.trips.filter(t=>(t.cabin||'').toLowerCase()===want);
    if(!trips.length)trips=data.trips;
    if(seats>1)trips=trips.filter(t=>(t.seats||0)>=seats);
    if(countEl)countEl.textContent=`${trips.length} ${flightLabel(trips.length)}`;
    const body=trips.map(t=>{
      const stops=t.stops?`${t.stops} ${L().stop}`:L().direct;
      const dur=t.duration?` · ${Math.floor(t.duration/60)}h${String(t.duration%60).padStart(2,'0')}`:"";
      const seatsTxt=t.seats?` · ${t.seats} ${seatLabel(t.seats)}`:"";
      const segs=(t.segments||[]).map(s=>`<div class="seg2"><b>${s.fn||''}</b> ${s.o}→${s.d} · ${fmtT(s.dep)}–${fmtT(s.arr)}${s.aircraft?` · ${s.aircraft}`:''}</div>`).join("");
      return `<div class="trip"><div class="trip-h"><span class="fn">${t.flightNumbers||t.carriers||''}</span><span class="trip-meta">${stops}${dur}${seatsTxt}</span></div><div class="segs">${segs}</div></div>`;
    }).join("");
    exp.innerHTML=body||`<div class="exp-load">—</div>`;
  }catch(e){exp.innerHTML=`<div class="exp-err">${L().flightsErr}</div>`;}
}

function openDetail(dest,keepPos){
  currentDest=dest;
  const rows=RECORDS.filter(x=>x.o===origin&&x.d===dest&&inRange(x.date)&&qualifies(x)).sort((a,b)=>a.date<b.date?-1:1);
  let cheapest=Infinity;rows.forEach(x=>CABS().forEach(c=>{if(passSeat(x[c])&&x[c].miles<cheapest)cheapest=x[c].miles;}));
  const dcity=(rows[0]||{}).dcity||dest,dcountry=(rows[0]||{}).dcountry||"";
  const o=(META.origins||[]).find(x=>x.iata===origin)||{};
  const monthsPresent=[...new Set(rows.map(x=>ymOf(x.date)))].sort();
  let strip="";
  monthsPresent.forEach(ym=>{
    const[y,mm]=ym.split('-');const mo=+mm-1;let cells="";
    rows.filter(x=>ymOf(x.date)===ym).forEach(rec=>{
      const dd=+rec.date.slice(8,10);let pips="";
      ['Y','J','F'].forEach(c=>{if(passSeat(rec[c])){const col=c==='Y'?'var(--jade)':c==='J'?'var(--gold)':'var(--burgundy)';pips+=`<i style="background:${col}"></i>`;}});
      if(pips)cells+=`<div class="day hit"><span class="dn">${dd}</span><span class="pips">${pips}</span></div>`;
    });
    if(cells)strip+=`<div class="month-block"><div class="mname">${(lang==='ar'?MONTHS_AR:MONTHS_EN)[mo]} ${y}</div><div class="days">${cells}</div></div>`;
  });

  // build flat list of (record, cabin) rows
  const flat=[];
  rows.forEach(x=>CABS().forEach(c=>{if(passSeat(x[c]))flat.push({x,c});}));
  const tableRows=flat.map(({x,c},i)=>{
    const cd=x[c],[y,mm,dd]=x.date.split('-').map(Number),dt=new Date(y,mm-1,dd);
    const dn=(lang==='ar'?DOW_AR:DOW_EN)[dt.getDay()],mn=(lang==='ar'?MONTHS_AR:MONTHS_EN)[mm-1];
    const cls=c==='Y'?'y':c==='J'?'j':'f',lab=c==='Y'?L().eco:c==='J'?L().biz:L().first;
    return `<div class="trow" data-id="${x.id}" data-cab="${c}" data-i="${i}">
      <div class="t-date">${dd} ${mn}<small>${dn}</small></div>
      <div class="t-cabin"><span class="pill ${cls}">${lab}</span> <span class="airl">${cd.airlines||''}</span></div>
      <div class="t-miles">${(cd.miles||0).toLocaleString('en')}</div>
      <div class="t-type">${cd.direct?`<span class="tag-direct">${L().direct}</span>`:`<span class="tag-stop">${L().stop}</span>`}</div>
      <div class="t-flights fcount" data-fc="${i}">—</div>
      <div class="caret">▾</div>
    </div><div class="trow-exp" data-exp="${i}"></div>`;
  }).join("");

  $("#detailView").innerHTML=`
    <button class="back" id="backBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>${L().backTo}</button>
    <div class="dhead"><div><div class="city">${dcity}</div><div class="ctyname">${ctryName(dcountry)}</div>
      <div class="pathline"><span>${origName(origin,o.city)}</span><span>✈</span><span>${dest}</span></div></div>
      <div class="price-tag"><span class="k">${cheapest===Infinity?'—':kk(cheapest)}</span><small>${rows.length} ${L().daysAvail}</small></div></div>
    <div class="strip-wrap"><div class="lab">${L().exactDays}</div>
      <div class="legend"><span><i style="background:var(--jade)"></i>${L().eco}</span><span><i style="background:var(--gold)"></i>${L().biz}</span><span><i style="background:var(--burgundy)"></i>${L().first}</span></div>${strip}</div>
    <div class="meta">${L().tapHint}</div>
    <div class="table" id="tbl">
      <div class="thead"><div>${L().colDate}</div><div>${L().colCabin}</div><div>${L().colMiles}</div><div>${L().colStop}</div><div>${L().colFlights}</div><div></div></div>
      ${tableRows||`<div class="trow" style="cursor:default"><div style="grid-column:1/-1;color:var(--muted)">${L().emptyTitle}</div></div>`}
    </div>`;
  $("#gridView").style.display="none";$("#detailView").style.display="block";
  $("#backBtn").onclick=()=>{currentDest=null;$("#detailView").style.display="none";$("#gridView").style.display="block";if(window.innerWidth<=820)scrollToEl($("#cards"));else window.scrollTo({top:0});};
  $("#tbl").onclick=e=>{
    const row=e.target.closest('.trow[data-id]');if(!row)return;
    const exp=row.nextElementSibling;
    const opening=!row.classList.contains('open');
    row.classList.toggle('open');exp.classList.toggle('show');
    if(opening&&!exp.dataset.loaded){exp.dataset.loaded="1";loadTrips(row.dataset.id,row.dataset.cab,exp,row.querySelector('.fcount'));}
  };
  if(!keepPos)scrollToEl($("#detailView"));
}

function applyLang(){
  document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  $("#langBtn").textContent=lang==='ar'?'EN':'ع';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(typeof L()[k]==='string')el.textContent=L()[k];});
}
function backToGrid(){if($("#detailView").style.display==='block'){$("#detailView").style.display='none';$("#gridView").style.display='block';}currentDest=null;}
function refreshView(){
  renderGrid();
  if(currentDest&&$("#detailView").style.display==='block'){
    const has=RECORDS.some(x=>x.o===origin&&x.d===currentDest&&inRange(x.date)&&qualifies(x));
    if(has)openDetail(currentDest,true); else backToGrid();
  }
}
function setDay(v,silent){
  day=v||null;
  if($("#m1")){$("#m1").disabled=!!day;$("#m2").disabled=!!day;}
  const dr=document.querySelector('.daterow'); if(dr)dr.classList.toggle('off',!!day);
  if($("#dayClear"))$("#dayClear").classList.toggle('show',!!day);
  if(!day&&$("#day"))$("#day").value="";
  if(!silent){refreshView();}
}
$("#langBtn").onclick=()=>{lang=lang==='ar'?'en':'ar';applyLang();updateStatus();renderOrigins();renderMonths();refreshView();};
$("#refreshBtn").onclick=refreshNow;
$("#origins").onclick=e=>{const c=e.target.closest('[data-o]');if(!c)return;origin=c.getAttribute('data-o');country="ALL";backToGrid();renderOrigins();renderGrid();};
$("#cabins").onclick=e=>{const b=e.target.closest('button');if(!b)return;cabin=b.getAttribute('data-c');document.querySelectorAll('#cabins button').forEach(x=>x.classList.remove('on'));b.classList.add('on');refreshView();};
$("#countryList").onclick=e=>{const c=e.target.closest('[data-ctry]');if(!c)return;country=c.getAttribute('data-ctry');backToGrid();renderGrid();if(window.innerWidth<=820)scrollToEl($("#cards"));};
$("#countrySelect").onchange=e=>{country=e.target.value;backToGrid();renderGrid();if(window.innerWidth<=820)scrollToEl($("#cards"));};
$("#cards").onclick=e=>{const c=e.target.closest('[data-dest]');if(!c)return;openDetail(c.getAttribute('data-dest'));};
$("#m1").onchange=e=>{m1=+e.target.value;if(m2<m1)m2=m1;renderMonths();refreshView();};
$("#m2").onchange=e=>{m2=+e.target.value;if(m2<m1)m1=m2;renderMonths();refreshView();};
$("#seats").onchange=e=>{seats=+e.target.value;refreshView();};
$("#day").onchange=e=>setDay(e.target.value);
$("#dayClear").onclick=()=>setDay(null);

applyLang();load();setInterval(updateStatus,60000);
</script>
</body>
</html>
